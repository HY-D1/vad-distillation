# Strict quick-test configuration for RTX 4080 (CUDA)
# Smoke test for strict true-label policy before full LOSO training.

seed: 6140
device: cuda
num_workers: 4
require_true_frame_labels: true

model:
  n_mels: 40
  cnn_channels:
  - 14
  - 28
  gru_hidden: 32
  gru_layers: 2
  dropout: 0.1

alpha: 0.6
temperature: 3.0

dataset: torgo_pilot
num_samples: 50
seq_len: 150
batch_size: 64
learning_rate: 0.001
num_epochs: 2

lr_scheduler:
  type: ReduceLROnPlateau
  factor: 0.5
  patience: 2
  min_lr: 0.0001

manifest: manifests/torgo_sentences.csv
teacher_probs_dir: teacher_probs/
hard_labels_dir: data/true_frame_labels/
allow_proxy_hard_labels: false
drop_missing_hard_labels: false
output_dir: outputs/quick_test_strict/

log_interval: 5
save_interval: 1

early_stopping:
  enabled: false
