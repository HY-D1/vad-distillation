# Alpha Sweep Configuration
# Purpose: Test different alpha values to find optimal weight for soft loss
# 
# Usage:
#   python train.py --config configs/alpha_sweep.yaml --alpha 0.3
#   python train.py --config configs/alpha_sweep.yaml --alpha 0.5
#   python train.py --config configs/alpha_sweep.yaml --alpha 0.7
#
# Note: The --alpha flag overrides the config value

# Random seed
seed: 42

# Device
device: cpu  # Use cpu for sweep experiments

# Model architecture (small for quick experiments)
model:
  n_mels: 40
  cnn_channels: [8, 16]    # Lightweight: ~200KB
  gru_hidden: 24
  gru_layers: 2
  dropout: 0.0

# Distillation hyperparameters
# Alpha is the weight on soft-label loss (0=hard only, 1=soft only)
# This value will be overridden via command line for the sweep
alpha: 0.5              # Default - sweep over: [0.0, 0.3, 0.5, 0.7, 1.0]
temperature: 3.0        # Fixed at moderate softening for alpha sweep

# Training (quick for sweep)
dataset: torgo_pilot
num_samples: 200        # More samples for meaningful comparison
seq_len: 100
batch_size: 8
learning_rate: 0.001
num_epochs: 3           # Multiple epochs to see learning dynamics

# Data paths
manifest: manifests/torgo_sentences.csv
teacher_probs_dir: teacher_probs/

# Output
output_dir: outputs/alpha_sweep/

# Logging
log_interval: 10
save_interval: 1

# Sweep Configuration Reference:
# 
# Alpha | Soft Loss Weight | Hard Loss Weight | Use Case
#-------|------------------|------------------|----------
# 0.0   | 0%               | 100%             | Baseline (no distillation)
# 0.3   | 30%              | 70%              | Conservative distillation
# 0.5   | 50%              | 50%              | Balanced (default)
# 0.7   | 70%              | 30%              | Aggressive distillation
# 1.0   | 100%             | 0%               | Pure distillation
#
# Expected Results:
# - alpha=0.0: Standard training, no teacher knowledge
# - alpha=0.5: Usually best balance (our default)
# - alpha=1.0: May overfit to teacher if teacher has errors
