# Temperature Sweep Configuration
# Purpose: Test different temperature values to find optimal softening
#
# Usage:
#   python train.py --config configs/temperature_sweep.yaml --temperature 1.0
#   python train.py --config configs/temperature_sweep.yaml --temperature 2.0
#   python train.py --config configs/temperature_sweep.yaml --temperature 3.0
#   python train.py --config configs/temperature_sweep.yaml --temperature 5.0
#
# Note: The --temperature flag overrides the config value

# Random seed
seed: 42

# Device
device: cpu  # Use cpu for sweep experiments

# Model architecture (small for quick experiments)
model:
  n_mels: 40
  cnn_channels: [8, 16]    # Lightweight: ~200KB
  gru_hidden: 24
  gru_layers: 2
  dropout: 0.0

# Distillation hyperparameters
# Temperature controls how much we soften teacher probabilities
alpha: 0.5              # Fixed at balanced for temperature sweep
temperature: 3.0        # Default - sweep over: [1.0, 2.0, 3.0, 5.0]

# Training (quick for sweep)
dataset: torgo_pilot
num_samples: 200        # More samples for meaningful comparison
seq_len: 100
batch_size: 8
learning_rate: 0.001
num_epochs: 3           # Multiple epochs to see learning dynamics

# Data paths
manifest: manifests/torgo_sentences.csv
teacher_probs_dir: teacher_probs/

# Output
output_dir: outputs/temperature_sweep/

# Logging
log_interval: 10
save_interval: 1

# Sweep Configuration Reference:
#
# Temperature | Softening | Dark Knowledge | Use Case
#-------------|-----------|----------------|----------
# 1.0         | None      | Minimal        | Standard training
# 2.0         | Mild      | Low            | Conservative softening
# 3.0         | Moderate  | Medium         | Balanced (default)
# 5.0         | Heavy     | High           | Confident teacher
# 10.0        | Extreme   | Very High      | Highly calibrated teacher
#
# Expected Results:
# - T=1.0: Similar to hard-label training
# - T=3.0: Usually best balance (our default)
# - T=5.0: May improve if teacher is very good
# - T=10.0: Risk of too much smoothing
#
# Visual Example (for teacher prob = 0.9):
# T=1.0: softened ≈ 0.90 (little change)
# T=3.0: softened ≈ 0.71 (moderate softening)
# T=5.0: softened ≈ 0.62 (heavy softening)
